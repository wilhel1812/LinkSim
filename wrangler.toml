name = "linksim"
compatibility_date = "2026-03-12"
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "linksim"
database_id = "d669aac0-37ea-4c68-9b27-ece888e1966a"

[vars]
# Cloudflare Access settings for JWT validation in Pages Functions.
# Team domain example: your-team.cloudflareaccess.com
ACCESS_TEAM_DOMAIN = "REPLACE_WITH_CLOUDFLARE_ACCESS_TEAM_DOMAIN"
# Access application AUD tag from Cloudflare Zero Trust application settings.
ACCESS_AUD = "REPLACE_WITH_CLOUDFLARE_ACCESS_AUD"
# Local dev fallback only (do not enable in production):
# ALLOW_INSECURE_DEV_AUTH = "true"
# DEV_AUTH_USER_ID = "local-dev-user@example.com"
