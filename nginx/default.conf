server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /meshmap/ {
    proxy_pass https://meshmap.net/;
    proxy_ssl_server_name on;
    proxy_set_header Host meshmap.net;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /ve2dbe/ {
    proxy_pass https://www.ve2dbe.com/;
    proxy_ssl_server_name on;
    proxy_set_header Host www.ve2dbe.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /api/geocode {
    proxy_pass https://nominatim.openstreetmap.org/search$is_args$args;
    proxy_ssl_server_name on;
    proxy_set_header Host nominatim.openstreetmap.org;
    proxy_set_header Accept application/json;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
