name: CI Quality Gates

on:
  pull_request:
    branches:
      - main
      - staging
  push:
    branches-ignore:
      - main
      - staging

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Secret pattern scan
        run: npm run security:scan

      - name: Run unit and API tests with coverage
        run: npm run test:ci

      - name: Build production bundle
        run: npm run build

      - name: Report status
        run: |
          echo "::notice ::CI Quality Gates passed"
      - name: Set commit status
        uses: actions/github-script@v7
        with:
          script: |
            const statusSha = context.payload.pull_request?.head?.sha ?? context.sha;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: statusSha,
              state: 'success',
              context: 'CI Quality Gates / verify',
              description: 'All quality gates passed',
            });
