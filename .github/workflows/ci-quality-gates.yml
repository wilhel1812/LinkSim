name: CI Quality Gates

on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit and API tests with coverage
        run: npm run test:ci

      - name: Build production bundle
        run: npm run build
