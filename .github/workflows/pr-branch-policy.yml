name: PR Branch Policy

on:
  pull_request:
    branches:
      - main
      - staging

jobs:
  enforce:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Validate head branch naming policy
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          if [ "$BASE_REF" = "staging" ]; then
            if [[ "$HEAD_REF" =~ ^issue/[0-9]+-[a-z0-9-]+$ ]] || [[ "$HEAD_REF" =~ ^hotfix/[a-z0-9-]+$ ]] || [[ "$HEAD_REF" =~ ^chore/[a-z0-9-]+$ ]]; then
              exit 0
            fi
            echo "PR to staging must come from issue/<id>-<slug>, hotfix/<slug>, or chore/<slug>."
            exit 1
          fi
          if [ "$BASE_REF" = "main" ]; then
            if [ "$HEAD_REF" = "staging" ] || [[ "$HEAD_REF" =~ ^hotfix/[a-z0-9-]+$ ]]; then
              exit 0
            fi
            echo "PR to main must come from staging (normal release) or hotfix/<slug> (approved incident only)."
            exit 1
          fi
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Enforce PR head is up-to-date with base
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git fetch origin "$BASE_REF"
          if git merge-base --is-ancestor "origin/$BASE_REF" HEAD; then
            echo "PR head includes latest origin/$BASE_REF"
            exit 0
          fi
          echo "PR head is behind origin/$BASE_REF. Rebase/merge base branch before merge."
          exit 1
      - name: Set commit status on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'PR Branch Policy / enforce',
              description: 'Branch naming policy satisfied',
            });
      - name: Set commit status on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'PR Branch Policy / enforce',
              description: 'Branch naming policy violation',
            });
